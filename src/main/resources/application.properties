# ?? Server ????????????????????????????????????????????????
spring.application.name=sqi-lost-and-found
server.port=8080

# ?? MongoDB ???????????????????????????????????????????????
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/sqi_lostandfound}

# ?? File Upload ???????????????????????????????????????????
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads

# ?? Twilio ????????????????????????????????????????????????
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.whatsapp.from=${TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}

# ?? Gmail SMTP ????????????????????????????????????????????
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_ADDRESS:}
spring.mail.password=${GMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ?? Admin Notifications ???????????????????????????????????
app.admin.email=${ADMIN_EMAIL:aderintojeremiah257@gmail.com}
app.admin.whatsapp=${ADMIN_WHATSAPP:}

# ?? Logging ???????????????????????????????????????????????
logging.level.org.springframework.data.mongodb=DEBUG